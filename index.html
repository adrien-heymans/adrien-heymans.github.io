<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrien Heymans – Projects</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      background: #f9fafb;
      color: #222;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }
    header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 1rem;
    }
    header h1 {
      margin: 0.5rem 0 0;
      font-size: 2rem;
    }
    header p {
      color: #555;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 0.5rem;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 1rem 0;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: transform 0.1s ease;
    }
    li:hover {
      transform: scale(1.01);
    }
    a {
      text-decoration: none;
      color: #0366d6;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <!-- optional profile picture -->
    <img src="https://avatars.githubusercontent.com/u/000000?v=4" alt="Profile Picture">
    <h1>Adrien Heymans</h1>
    <p>Software projects, experiments & ideas</p>
    <p>
      <a href="https://github.com/adrienheymans" target="_blank">GitHub</a> ·
      <a href="https://www.linkedin.com/in/adrienheymans" target="_blank">LinkedIn</a>
    </p>
  </header>

  <main>
    <h2>GitHub Projects</h2>
    <ul id="projects">
      <li>Loading projects...</li>
    </ul>
  </main>

  <footer>
    © <span id="year"></span> Adrien Heymans
  </footer>

  <script>
    // Update footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    fetch("https://api.github.com/users/adrienheymans/repos?sort=updated")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("projects");
        list.innerHTML = "";
